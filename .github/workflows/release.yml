name: Publish Release

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5
        with:
          go-version: '1.26.5'

      - name: Build release binaries
        run: |
          mkdir -p dist
          for os in linux darwin; do
            for arch in amd64 arm64; do
              GOOS="$os" GOARCH="$arch" go build \
                -o "dist/outpost-$os-$arch" .
            done
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum outpost-linux-amd64 outpost-linux-arm64 outpost-darwin-amd64 outpost-darwin-arm64 > checksums.txt
          cat checksums.txt

      - name: Create and push tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(tr -d '[:space:]' < internal/version/VERSION)
          TAG="v${VERSION}"
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git fetch "${REPO_URL}" --tags
          if git ls-remote --exit-code --tags "${REPO_URL}" "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists. Bump internal/version/VERSION first."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "outpost ${TAG}"
          git push "${REPO_URL}" "${TAG}"

      - name: Create versioned release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(tr -d '[:space:]' < internal/version/VERSION)
          gh release create "v${VERSION}" \
            dist/outpost-linux-amd64 \
            dist/outpost-linux-arm64 \
            dist/outpost-darwin-amd64 \
            dist/outpost-darwin-arm64 \
            dist/checksums.txt \
            --title "outpost v${VERSION}" \
            --notes "Linux and macOS builds for amd64 and arm64."

      - name: Refresh rolling latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(tr -d '[:space:]' < internal/version/VERSION)
          REPO_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if gh release view latest >/dev/null 2>&1; then
            gh release delete latest --yes
          fi

          if git rev-parse --verify refs/tags/latest >/dev/null 2>&1; then
            git tag -d latest
          fi

          if git ls-remote --exit-code --tags "${REPO_URL}" "refs/tags/latest" >/dev/null 2>&1; then
            git push "${REPO_URL}" :refs/tags/latest
          else
            echo "Remote latest tag does not exist yet."
          fi

          gh release create latest \
            dist/outpost-linux-amd64 \
            dist/outpost-linux-arm64 \
            dist/outpost-darwin-amd64 \
            dist/outpost-darwin-arm64 \
            dist/checksums.txt \
            --target "${GITHUB_SHA}" \
            --title "outpost latest (v${VERSION})" \
            --notes "Rolling latest release for the most recent outpost version: v${VERSION}." \
            --latest
