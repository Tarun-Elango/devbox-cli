name: Build and Single-Latest Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build binary
        run: go build -o devbox -ldflags "-X main.ServerURL=${{ secrets.SERVER_URL }}" .

      - name: Get latest release (if exists)
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e

          latest_tag=$(gh api repos/${{ github.repository }}/releases/latest --jq '.tag_name' 2>/dev/null)
          status=$?

          set -e

          if [ $status -ne 0 ] || [ "$latest_tag" = "null" ] || [ -z "$latest_tag" ]; then
            latest_tag=""
          fi

          echo "latest_tag=$latest_tag" >> $GITHUB_OUTPUT

      - name: Delete latest release (if exists)
        if: steps.latest.outputs.latest_tag != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest="${{ steps.latest.outputs.latest_tag }}"

          echo "Attempting delete for: $latest"

          release_id=$(gh api repos/${{ github.repository }}/releases/tags/$latest --jq '.id' 2>/dev/null || echo "")

          if [ -n "$release_id" ]; then
            gh api -X DELETE repos/${{ github.repository }}/releases/$release_id || true
            git tag -d "$latest" || true
            git push origin ":refs/tags/$latest" || true
          else
            echo "No release found for tag $latest — skipping delete"
          fi

      - name: Create new release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="latest-$(date +'%Y%m%d-%H%M%S')"

          git tag $tag
          git push origin $tag

          gh release create "$tag" devbox \
            --title "Latest build $tag" \
            --notes "Auto-generated build from main"