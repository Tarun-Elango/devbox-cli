name: Build and Single-Latest Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5
        with:
          go-version: '1.24'

      - name: Build binary (latest build)
        run: go build -o devbox -ldflags "-X main.ServerURL=${{ secrets.SERVER_URL }}" .

      - name: Create new release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest devbox \
            --target "${{ github.sha }}" \
            --title "Latest build" \
            --notes "Auto-generated build from main" \
            --latest
